<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUD ↔ CNY</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f9f7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.05);
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .06em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #aaa;
  }

  input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e8e8e6;
    border-radius: 10px;
    font-size: 22px;
    font-weight: 500;
    color: #1a1a1a;
    background: #fafaf8;
    outline: none;
    transition: border-color .15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus {
    border-color: #5b8cf5;
    background: #fff;
  }

  .arrow {
    font-size: 18px;
    color: #ccc;
    flex-shrink: 0;
    margin-top: 18px;
    user-select: none;
  }

  .divider {
    border: none;
    border-top: 1px solid #f0f0ee;
    margin: 28px 0;
  }

  .rate-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .rate-label {
    font-size: 13px;
    color: #aaa;
    white-space: nowrap;
  }

  input.rate-input {
    width: 80px;
    padding: 7px 10px;
    border: 1.5px solid #e8e8e6;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #555;
    background: #fafaf8;
    outline: none;
    text-align: center;
    transition: border-color .15s;
    -moz-appearance: textfield;
  }
  input.rate-input::-webkit-inner-spin-button,
  input.rate-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input.rate-input:focus {
    border-color: #5b8cf5;
    background: #fff;
  }

  .hint {
    font-size: 12px;
    color: #bbb;
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="card">
  <h1>汇率换算</h1>

  <div class="row">
    <div class="field">
      <label>AUD · 澳元</label>
      <input type="number" id="aud" placeholder="0" step="any" inputmode="decimal">
    </div>
    <div class="arrow">⇄</div>
    <div class="field">
      <label>CNY · 人民币</label>
      <input type="number" id="cny" placeholder="0" step="any" inputmode="decimal">
    </div>
  </div>

  <hr class="divider">

  <div class="rate-row">
    <span class="rate-label">1 AUD =</span>
    <input type="number" class="rate-input" id="rate" value="4.70" step="0.01" inputmode="decimal">
    <span class="rate-label">CNY</span>
    <span class="hint">手动填汇率</span>
  </div>
</div>

<script>
  const audEl  = document.getElementById('aud');
  const cnyEl  = document.getElementById('cny');
  const rateEl = document.getElementById('rate');

  function getRate() {
    return parseFloat(rateEl.value) || 4.70;
  }

  audEl.addEventListener('input', () => {
    const v = parseFloat(audEl.value);
    cnyEl.value = isNaN(v) ? '' : +(v * getRate()).toFixed(4);
  });

  cnyEl.addEventListener('input', () => {
    const v = parseFloat(cnyEl.value);
    audEl.value = isNaN(v) ? '' : +(v / getRate()).toFixed(4);
  });

  rateEl.addEventListener('input', () => {
    if (audEl.value !== '') {
      const v = parseFloat(audEl.value);
      cnyEl.value = isNaN(v) ? '' : +(v * getRate()).toFixed(4);
    }
  });
</script>
</body>
</html>
